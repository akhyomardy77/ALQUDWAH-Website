<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ALQUDWAH MEMBER</title>

<style>
:root{
    --gold1:#f59e0b;
    --gold2:#fbbf24;
    --dark:#134e4a;
    --soft:#fff7ed;
}

*{
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,var(--gold2),var(--soft));
    display:flex;
    justify-content:center;
    align-items:center;
    animation:fadeIn 1s ease;
}

/* ===== FADE ===== */
@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

/* ===== SHAKE ===== */
.shake{
    animation:shake .35s;
}
@keyframes shake{
    0%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    50%{transform:translateX(5px)}
    75%{transform:translateX(-5px)}
    100%{transform:translateX(0)}
}

/* ===== BACK BUTTON ===== */
.btn-back{
    position:fixed;
    top:18px;
    left:18px;
    width:46px;
    height:46px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,var(--gold1),var(--gold2));
    border-radius:50%;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    transition:.25s;
    z-index:2000;
}
.btn-back img{
    width:22px;
}
.btn-back:hover{
    transform:scale(1.08);
}

/* ===== LOGIN BOX ===== */
.login-box{
    background:#fff;
    width:360px;
    padding:32px 28px;
    border-radius:14px;
    box-shadow:0 20px 40px rgba(0,0,0,.18);
    text-align:center;
}

.login-box h2{
    margin:0;
    color:var(--dark);
}

.login-box p{
    font-size:14px;
    color:#555;
    margin:8px 0 24px;
}

.login-box input{
    width:100%;
    padding:12px 42px 12px 14px;
    margin-bottom:14px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

.login-box input:focus{
    outline:none;
    border-color:var(--gold1);
}

/* ===== PASSWORD TOGGLE ===== */
.pass-wrap{
    position:relative;
}

.toggle-pass{
    position:absolute;
    top:50%;
    right:12px;
    transform:translateY(-50%);
    cursor:pointer;
    opacity:.6;
    transition:.2s;
}
.toggle-pass img{
    width:20px;
}
.toggle-pass:hover{
    opacity:1;
}
.toggle-pass.active{
    opacity:1;
    transform:translateY(-50%) scale(1.1);
}

/* ===== BUTTON ===== */
.login-box button{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,var(--gold1),var(--gold2));
    border:none;
    color:var(--dark);
    font-size:15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:.25s;
}
.login-box button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.footer-text{
    margin-top:18px;
    font-size:12px;
    color:#888;
}

@media(max-width:420px){
    .login-box{width:90%}
}
</style>
</head>

<body>

<!-- BACK -->
<a href="javascript:history.back()" class="btn-back">
    <img src="arrow_back_ios_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg">
</a>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
    <h2>ALQUDWAH | MEMBER</h2>
    <p>Login Member ALQUDWAH Profile</p>

    <form onsubmit="return loginAdmin()">
        <input type="text" id="username" placeholder="Username" required>

        <div class="pass-wrap">
            <input type="password" id="password" placeholder="Password" required>
            <span class="toggle-pass" onclick="togglePassword()">
                <img src="f4f343e4-d8c7-4732-b9b4-af4d81dd9a15.svg">
            </span>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="footer-text">
        © 2026 ALQUDWAH
    </div>
</div>

<script>
const users = [
    { username:"habeebakhyomardy", password:"pas", role:"Habeeb Akhy Omardy" },
    { username:"abhinurhidayah", password:"pas", role:"Abhi Nurhidayah" },
    { username:"ridwandarussalam", password:"pas", role:"Ridwan Darussalam" }
];

function togglePassword(){
    const p = document.getElementById("password");
    const t = document.querySelector(".toggle-pass");
    p.type = p.type === "password" ? "text" : "password";
    t.classList.toggle("active");
}

function loginAdmin(){
    const box = document.getElementById("loginBox");
    const u = username.value;
    const p = password.value;

    const user = users.find(x => x.username === u && x.password === p);

    if(user){
        localStorage.setItem("loginUser", JSON.stringify(user));
        alert("Login berhasil sebagai " + user.role);
        window.location.href = "dashboard.html";
    }else{
        box.classList.remove("shake");
        void box.offsetWidth;
        box.classList.add("shake");
        alert("Username atau password salah!");
    }
    return false;
}

/* ===== TAMBAHAN: redirect dari popup ===== */
function goToLogin(){
    window.location.href = "login.html";
}
</script>

</body>
</html>
